[phases.setup]
nixPkgs = ['python312']

[phases.install]
cmds = [
  'python -m venv /opt/venv',
  '. /opt/venv/bin/activate && pip install --upgrade pip',
  '. /opt/venv/bin/activate && pip install -e .',
]

[start]
cmd = '. /opt/venv/bin/activate && python -m uvicorn afters.main:app --host 0.0.0.0 --port $PORT'
